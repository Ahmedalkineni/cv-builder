<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CV Builder ATS</title>

<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

<h1>ATS CV Builder</h1>

<div class="form-section">

<input type="text" id="name" placeholder="Full Name">

<input type="text" id="jobTitle" placeholder="Job Title">

<input type="text" id="phone" placeholder="Phone">

<input type="email" id="email" placeholder="Email">

<textarea id="summary" placeholder="Professional Summary"></textarea>

<textarea id="experience" placeholder="Work Experience"></textarea>

<textarea id="skills" placeholder="Skills (one skill per line)"></textarea>

<textarea id="education" placeholder="Education"></textarea>

<button onclick="generateCV()">Generate CV</button>

</div>

<div id="cv"></div>

</div>

<script src="script.js"></script>

</body>
</html>
